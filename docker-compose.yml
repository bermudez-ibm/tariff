version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tariff-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tariff_resilience
      POSTGRES_USER: tariff_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tariff_user -d tariff_resilience"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tariff-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tariff-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tariff_user:${POSTGRES_PASSWORD:-changeme}@postgres:5432/tariff_resilience
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: http://127.0.0.1:8080,http://localhost:8080
      DEBUG: ${DEBUG:-false}
      API_PORT: 9000
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    ports:
      - "9000:9000"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tariff-network

  # Frontend (Nginx serving static files + reverse proxy)
  frontend:
    image: nginx:alpine
    container_name: tariff-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tariff-network

volumes:
  postgres_data:
    driver: local

networks:
  tariff-network:
    driver: bridge
